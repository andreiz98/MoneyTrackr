{% extends "base.html" %}

{% block title %}All Transactions{% endblock %}

{% block content %}
    <div class="container-fluid">

        <div class="card shadow">
            <div class="ms-auto">
                <button class="btn btn-secondary mb-3" type="button" data-bs-toggle="collapse"
                        data-bs-target="#filterCollapse" aria-expanded="false" aria-controls="filterCollapse">
                    Filters
                </button>

                <div class="collapse" id="filterCollapse">
                    <form method="get" class="d-flex flex-wrap gap-2 mb-3 align-items-center">

                        <!-- Search după titlu -->
                        <input type="text" name="q" class="form-control" placeholder="Search..."
                               value="{{ search_query }}">

                        <!-- Calendar -->
                        <label>From:</label>
                        <input type="date" name="start_date" class="form-control" value="{{ start_date }}">

                        <label>To:</label>
                        <input type="date" name="end_date" class="form-control" value="{{ end_date }}">

                        <!-- Tip tranzacție -->
                        <select name="type" class="form-select">
                            <option value="">All Types</option>
                            <option value="income" {% if type_filter == "income" %}selected{% endif %}>Income</option>
                            <option value="expense" {% if type_filter == "expense" %}selected{% endif %}>Expense
                            </option>
                        </select>

                        <!-- Suma -->
                        <input type="number" step="0.01" name="min_amount" class="form-control" placeholder="Min Amount"
                               value="{{ min_amount }}">
                        <input type="number" step="0.01" name="max_amount" class="form-control" placeholder="Max Amount"
                               value="{{ max_amount }}">

                        <button class="btn btn-primary" type="submit">Filter</button>
                    </form>
                </div>
            </div>

            <div class="card-header text-center fw-bold">
                Transactions
            </div>

            <div class="card-body">

                <table class="table">

                    <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Date</th>
                    </tr>
                    </thead>

                    <tbody>

                    {% for transaction in transactions %}

                        <tr>
                            <td>{{ transaction.title }}</td>
                            <td>${{ transaction.amount }}</td>
                            <td>{{ transaction.type }}</td>
                            <td>{{ transaction.date }}</td>
                        </tr>

                    {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>
{% endblock %}
